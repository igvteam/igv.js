<html>
<head>
    <title>igv.js embedding example</title>
</head>

<body>
<div style="background:#f0f0f0;padding:4px 8px;font-family:sans-serif;font-size:12px;border-bottom:1px solid #ddd"><a href="https://raw.githubusercontent.com/igvteam/igv.js/refs/heads/master/examples/custom-file-format.html" target="_blank" rel="noopener" class="source-link">View page source</a></div>


Example illustrates registering a custom tab delimited format.

<div id="igvDiv"></div>

<script type="module">

    import igv from "../dist/igv.esm.min.js"

    const dragenrohbedFormatFields = ['chr', 'start', 'end', 'score', 'hom', 'het']
    igv.registerFileFormats("dragenrohbed", dragenrohbedFormatFields)

    const config = {
        genome: "hg38",
        locus: "chr8:1246755-1353734",
        tracks: [
            {
                name: "GM12878 H3K27ac ",
                url: "https://www.encodeproject.org/files/ENCFF716VWO/@@download/ENCFF716VWO.bigWig",
                color: "rgb(200,0,0)",
                type: "wig",
                format: "bigwig"
            },
            {
                name: "GM12878 H3K4me3 ",
                url: "https://www.encodeproject.org/files/ENCFF669DTI/@@download/ENCFF669DTI.bigWig",
                color: "rgb(0,150,0)",
                format: "bigwig",
                type: "wig"
            },
            {
                name: 'ILMN Dragen ROH',
                url: './Example.dragen.roh.bed',
                color: '#03A9F4',
                type: 'annotation',
                format: 'dragenrohbed',
            }
        ]
    }

    const browser = await igv.createBrowser(document.getElementById("igvDiv"), config)

</script>

</body>
</html>
