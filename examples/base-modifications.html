<!DOCTYPE html>
<html lang="en">
<head>

    <title>igv.js</title>
</head>

<body>
<div style="background:#f0f0f0;padding:4px 8px;font-family:sans-serif;font-size:12px;border-bottom:1px solid #ddd"><a href="https://raw.githubusercontent.com/igvteam/igv.js/refs/heads/master/examples/base-modifications.html" target="_blank" rel="noopener" class="source-link">View page source</a></div>


<h1>Base Modifications</h1>

<div id="igvDiv" style="padding-top: 10px;padding-bottom: 10px; border:1px solid lightgray"></div>

<script type="module">

    import igv from "../dist/igv.esm.min.js"

    const options = {
        "genome": "hg38",
        "locus": "chr11:119094729-119094804",
        "tracks": [
            {
                "type": "alignment",
                "format": "bam",
                "url": "https://raw.githubusercontent.com/igvteam/igv-data/refs/heads/main/data/test/bam/basemods/pacbio/HG002_chr11_119076212_119102218.bam",
                "indexURL": "https://raw.githubusercontent.com/igvteam/igv-data/refs/heads/main/data/test/bam/basemods/pacbio/HG002_chr11_119076212_119102218.bam.bai",
                "height": 400,
                "name": "5mC and 6mA - 2 color mode",
                "colorBy": "basemod2",
                "groupBy": "strand",
                "baseModificationThreshold": 0
            },
            {
                "type": "alignment",
                "format": "bam",
                "url": "https://raw.githubusercontent.com/igvteam/igv-data/refs/heads/main/data/test/bam/basemods/pacbio/HG002_chr11_119076212_119102218.bam",
                "indexURL": "https://raw.githubusercontent.com/igvteam/igv-data/refs/heads/main/data/test/bam/basemods/pacbio/HG002_chr11_119076212_119102218.bam.bai",
                "height": 400,
                "name": "5mC and 6mA - mono color mode",
                "colorBy": "basemod",
                "groupBy": "strand"
            }
        ]
    }

    var igvDiv = document.getElementById("igvDiv")

    igv.createBrowser(igvDiv, options)
        .then(function (browser) {
            console.log("Created IGV browser")
        })

</script>

</body>

</html>
