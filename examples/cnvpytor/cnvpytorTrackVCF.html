<body>
<div style="background:#f0f0f0;padding:4px 8px;font-family:sans-serif;font-size:12px;border-bottom:1px solid #ddd"><a href="https://raw.githubusercontent.com/igvteam/igv.js/refs/heads/master/examples/cnvpytor/cnvpytorTrackVCF.html" target="_blank" rel="noopener" class="source-link">View page source</a></div>


<h2>CNVpytor Track</h2>


<div id="igvDiv" style="padding-top: 50px;padding-bottom: 20px; height: auto"></div>

<script type="module">

    import igv from "../../dist/igv.esm.js"
    const options =
        {
            genome: "hg19",
            locus: "chr16",
            tracks: [
                {
                    type: "cnvpytor",
                    name: "HepG2 VCF",
                    url: "https://storage.googleapis.com/cnvpytor_data/HepG2.vcf.gz",

                }
            ]
        }

    igv.createBrowser(document.getElementById('igvDiv'), options)


</script>

</body>
