<html>
<head>
    <title>igv.js embedding example</title>
</head>

<body>
<div style="background:#f0f0f0;padding:4px 8px;font-family:sans-serif;font-size:12px;border-bottom:1px solid #ddd"><a href="https://raw.githubusercontent.com/igvteam/igv.js/refs/heads/master/examples/quick-start.html" target="_blank" rel="noopener" class="source-link">View page source</a></div>


<div id="igvDiv"></div>

<script type="module">

    import igv from "../dist/igv.esm.min.js"

    const config = {
        reference: "hg38",
        locus: "myc",
        tracks: [
            {
                name: "GM12878 H3K27ac ",
                url: "https://www.encodeproject.org/files/ENCFF716VWO/@@download/ENCFF716VWO.bigWig",
                color: "rgb(200,0,0)",
                type: "wig",
                format: "bigwig"
            },
            {
                name: "GM12878 H3K4me3 ",
                url: "https://www.encodeproject.org/files/ENCFF669DTI/@@download/ENCFF669DTI.bigWig",
                color: "rgb(0,150,0)",
                format: "bigwig",
                type: "wig"
            }
        ]
    }

    const browser = await igv.createBrowser(document.getElementById("igvDiv"), config)

</script>

</body>
</html>
