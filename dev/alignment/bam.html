<!DOCTYPE html>
<html lang="en">
<head>
    <title>dev - alignment - bam</title>
</head>

<body>

<h2>
    BAM file
    <ul>
        <li>Grouped by strand</li>
        <li>Sorted by base @chr1:155,155,405</li>
        <li>Filtered by mapping quality >= 60</li>
        <li>Show tags: MD, RG, XC</li>
    </ul>
</h2>

<button id="log-state">Log Session</button>
<button id="bookmark">Bookmark</button>

<div id="igvDiv" style="padding-top: 50px;padding-bottom: 20px; height: auto"></div>

<script type="module">

    import igv from "../../js/index.js"

    const config =
        {
            "queryParametersSupported": true,
            "genome": "hg38",
            "locus": "chr17:7,579,451-7,579,491",
            "roi": [],
            "tracks": [
                {
                    "type": "alignment",
                    "url": "https://ftp.1000genomes.ebi.ac.uk/vol1/ftp/data_collections/illumina_platinum_pedigree/data/CEU/NA12878/alignment/NA12878.alt_bwamem_GRCh38DH.20150706.CEU.illumina_platinum_ped.cram",
                    "indexURL": "https://ftp.1000genomes.ebi.ac.uk/vol1/ftp/data_collections/illumina_platinum_pedigree/data/CEU/NA12878/alignment/NA12878.alt_bwamem_GRCh38DH.20150706.CEU.illumina_platinum_ped.cram.crai",
                    "name": "NA12878",
                    "format": "cram",
                    "sort": {
                        "chr": "chr1",
                        "position": 155155405,
                        "option": "BASE",
                        "direction": "ASC"
                    },
                    groupBy: "strand",
                    height: 800,
                    filter: {mq: 60},
                    //hideTags: [ "MD", "RG", "XC"],
                    showTags: ["MD", "RG", "XC"]
                }
            ]
        }

    igv.createBrowser(document.getElementById('igvDiv'), config)
        .then(browser => {
            document.getElementById("log-state").addEventListener("click", () => console.log(browser.toJSON()))

            document.getElementById('bookmark').addEventListener('click', () => {
                const path = window.location.href.slice()
                const idx = path.indexOf("?")
                const url = (idx > 0 ? path.substring(0, idx) : path) + "?sessionURL=blob:" + browser.compressedSession()
                window.history.pushState({}, "IGV", url)
            })
        })


</script>

</body>

</html>
