<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link href=https://igv.org/web/img/favicon.ico rel="shortcut icon">
    <title>Gene Render Refactor</title>

</head>

<body>

<div id="igv-container" style="padding-top: 50px;padding-bottom: 20px; height: auto">

</div>

<script type="module">

    import igv from "../js/index.js";

    document.addEventListener('DOMContentLoaded', async () => {

        const config =
            {
                locus: '19:49301000-49305700',
                genome: "hg19",
                showTrackLabels: false,
                showIdeogram: false,
                showRuler: true,
                showSequence: false,
                // showNavigation: false
            };

        const browser = await igv.createBrowser(document.getElementById('igv-container'), config)

        console.log(`browser ${browser.guid} is good to go`)

    })


</script>

</body>

</html>
